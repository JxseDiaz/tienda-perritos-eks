apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: tienda-cluster
  region: us-east-1

iam:
  serviceRoleARN: arn:aws:iam::896270662839:role/LabRole

managedNodeGroups:
  - name: tienda-nodes
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 3
    iam:
      instanceRoleARN: arn:aws:iam::896270662839:role/LabRole